name: Build and Release

on:
  push:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev
      - name: Install fyne CLI
        run: |
          go install fyne.io/fyne/v2/cmd/fyne@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
      - name: Package
        run: fyne package -os linux -icon icon.png -name SongConverter
      - uses: actions/upload-artifact@v4
        with:
          name: SongConverter-linux
          path: SongConverter.tar.xz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Install fyne CLI
        run: |
          go install fyne.io/fyne/v2/cmd/fyne@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
      - name: Package
        run: fyne package -os windows -icon icon.png -name SongConverter
      - uses: actions/upload-artifact@v4
        with:
          name: SongConverter-windows
          path: SongConverter.exe

  build-macos-intel:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Install fyne CLI
        run: |
          go install fyne.io/fyne/v2/cmd/fyne@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
      - name: Package
        run: fyne package -os darwin -icon icon.png -name SongConverter
      - name: Zip app bundle
        run: zip -r SongConverter-intel.zip SongConverter.app
      - uses: actions/upload-artifact@v4
        with:
          name: SongConverter-macos-intel
          path: SongConverter-intel.zip

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Install fyne CLI
        run: |
          go install fyne.io/fyne/v2/cmd/fyne@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
      - name: Package
        run: fyne package -os darwin -icon icon.png -name SongConverter
      - name: Zip app bundle
        run: zip -r SongConverter-arm64.zip SongConverter.app
      - uses: actions/upload-artifact@v4
        with:
          name: SongConverter-macos-arm64
          path: SongConverter-arm64.zip

  # NEW RELEASE JOB
  publish:
    name: Publish Release Assets
    if: github.event_name == 'release'
    needs: [build-linux, build-windows, build-macos-intel, build-macos-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./assets
          merge-multiple: true

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./assets/SongConverter.tar.xz
            ./assets/SongConverter.exe
            ./assets/SongConverter-intel.zip
            ./assets/SongConverter-arm64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
